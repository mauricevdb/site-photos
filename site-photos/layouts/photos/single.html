{{ define "main" }}
<article class="photo-page">
  <div class="photo-view">
    <img src="{{ .Params.image | relURL }}" alt="{{ .Title }}">
  </div>
  <div class="photo-order">
    <h1>{{ .Title }}</h1>
    {{ .Content }}

    <label for="format-select">Format du tirage</label>
    <select id="format-select">
      {{ range $i, $f := .Params.formats }}
      <option value="{{ $f.name }}" data-surcharge="{{ $f.surcharge }}">
        {{ $f.name }} — {{ add $.Params.base_price $f.surcharge }} €
      </option>
      {{ end }}
    </select>

    {{ $opts := slice }}
    {{ range .Params.formats }}
      {{ if gt .surcharge 0 }}
        {{ $opts = $opts | append (printf "%s[+%.2f]" .name (float .surcharge)) }}
      {{ else }}
        {{ $opts = $opts | append .name }}
      {{ end }}
    {{ end }}

    <button class="snipcart-add-item btn"
      id="buy-button"
      data-item-id="{{ .Params.sku }}"
      data-item-name="{{ .Title }}"
      data-item-price="{{ .Params.base_price }}"
      data-item-url="{{ .Permalink }}"
      data-item-image="{{ .Params.image | absURL }}"
      data-item-description="{{ .Summary | plainify | truncate 120 }}"
      data-item-custom1-name="Format"
      data-item-custom1-options="{{ delimit $opts "|" }}"
      data-item-custom1-value="{{ (index .Params.formats 0).name }}">
      Ajouter au panier — <span id="price-display">{{ .Params.base_price }}</span> €
    </button>
  </div>
</article>

<script>
  (function () {
    var select = document.getElementById('format-select');
    var button = document.getElementById('buy-button');
    var display = document.getElementById('price-display');
    var basePrice = {{ .Params.base_price }};
    select.addEventListener('change', function () {
      var opt = select.options[select.selectedIndex];
      button.setAttribute('data-item-custom1-value', opt.value);
      display.textContent = basePrice + Number(opt.dataset.surcharge);
    });
  })();
</script>
{{ end }}
