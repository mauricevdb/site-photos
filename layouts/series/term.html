{{ define "main" }}
<article class="page serie-page">
  <h1>{{ .Title }}</h1>
  <p class="serie-intro">Série de {{ len .Pages }} photos — chaque tirage s'achète individuellement.</p>
</article>
<div class="grid">
  {{ range sort .Pages "Params.ordre" "asc" }}
  <a class="card" href="{{ .RelPermalink }}">
    {{ partial "vignette.html" (dict "page" . "largeur" 600) }}
    <div class="card-info">
      <h3>{{ .Title }}</h3>
      <p>à partir de {{ .Params.base_price }} €</p>
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
