{{ define "main" }}
<article class="page serie-page">
  <h1>{{ .Title }}</h1>
  <p class="serie-intro">Série de {{ len .Pages }} photos — chaque tirage se commande ci-dessous.</p>
</article>
{{ range sort .Pages "Params.ordre" "asc" }}
<section class="serie-item" id="{{ path.BaseName .File.Path }}">
  {{ partial "vignette.html" (dict "page" . "largeur" 1200) }}
  <div class="serie-commande">
    <h3>{{ .Title }}</h3>
    {{ partial "achat.html" (dict "page" .) }}
  </div>
</section>
{{ end }}
{{ end }}
