{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<section class="grid">
  {{ range .Pages.ByDate }}
  <a class="card" href="{{ .RelPermalink }}">
    <img src="{{ .Params.image | relURL }}" alt="{{ .Title }}" loading="lazy">
    <div class="card-info">
      <h3>{{ .Title }}</h3>
      <p>à partir de {{ .Params.base_price }} €</p>
    </div>
  </a>
  {{ end }}
</section>
{{ end }}
