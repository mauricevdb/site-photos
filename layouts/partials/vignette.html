{{- $page := .page -}}{{- $largeur := .largeur -}}
{{- $img := partial "img-res.html" (dict "page" $page) -}}
{{- if $img -}}
  {{- $img = $img.Filter images.AutoOrient -}}
  {{- $t := $img.Resize (printf "%dx webp q80" $largeur) -}}
  <img src="{{ $t.RelPermalink }}" width="{{ $t.Width }}" height="{{ $t.Height }}" alt="{{ $page.Title }}" loading="lazy">
{{- else -}}
  <img src="{{ $page.Params.image | relURL }}" alt="{{ $page.Title }}" loading="lazy">
{{- end -}}
