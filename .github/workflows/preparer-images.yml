name: Préparer les images du site

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convertir la carte et le logo
        run: |
          shopt -s nullglob
          for f in static/carte-originale.*; do
            magick "$f" -auto-orient -resize 2000x -quality 82 static/carte-voyage.jpg
            echo "Carte convertie depuis $f"
          done
          for f in static/logo-original.*; do
            magick "$f" -auto-orient -resize 300x static/logo.png
            echo "Logo converti depuis $f"
          done
          ls -la static/ | grep -E 'carte|logo' || true

      - name: Enregistrer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Préparation carte et logo"
          git push

      - name: Relancer le déploiement
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
