name: Préparer les images du site

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convertir la carte et le logo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick libheif-examples webp
          shopt -s nullglob
          preparer() {
            local f="$1" cible="$2" taille="$3"
            local type src
            type=$(file -b --mime-type "$f")
            echo "$f : format reel = $type"
            case "$type" in
              text/*|application/octet-stream|inode/x-empty)
                echo "ATTENTION : $f n'est pas une image exploitable. Debut du contenu :"
                head -c 300 "$f" || true
                echo ""
                return 0
                ;;
              image/heic|image/heif)
                heif-convert "$f" /tmp/entree.png
                src=/tmp/entree.png
                ;;
              image/webp)
                dwebp "$f" -o /tmp/entree.png
                src=/tmp/entree.png
                ;;
              *)
                cp "$f" /tmp/entree
                src=/tmp/entree
                ;;
            esac
            convert "$src" -auto-orient -resize "$taille" -quality 82 "$cible"
            echo "Converti : $f -> $cible"
          }
          for f in static/carte-originale.*; do preparer "$f" static/carte-voyage.jpg 2000x; done
          for f in static/logo-original.*; do preparer "$f" static/logo.png 300x; done
          ls -la static/ | grep -E 'carte|logo' || true

      - name: Enregistrer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Préparation carte et logo"
          git push

      - name: Relancer le déploiement
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
